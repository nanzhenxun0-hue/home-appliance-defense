<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>家電ディフェンス</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#eef2f7,#fff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #0070f3;
  color: white;
  border: none;
  border-radius: 10px;
}

.top-left {
  position: fixed;
  top: 10px;
  left: 10px;
}

.link-btn {
  display: block;
  margin-top: 10px;
  text-decoration: none;
  color: #0070f3;
}
</style>
</head>

<body>

<div class="top-left">
  <a href="https://buymeacoffee.com/nanzhenxunx" target="_blank">☕ Support</a>
</div>

<div class="container">
  <h1>🔐 家電ディフェンス</h1>
  <p>URLの安全性チェック</p>

  <input id="url" placeholder="https://example.com">
  <button onclick="check()">分析</button>

  <p id="result"></p>

  <a href="/game.html" class="link-btn">🎮 ゲームで遊ぶ</a>
</div>

<script>
function check() {
  const input = document.getElementById("url").value;
  let risk = 0;

  if (!input.startsWith("https://")) risk++;
  if (input.length > 50) risk++;

  document.getElementById("result").innerText =
    risk >= 2 ? "⚠️ 注意" : "✅ 安全そう";
}
</script>

</body>
</html>
