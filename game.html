<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゲーム</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  text-align: center;
}

canvas {
  background: #222;
  margin-top: 20px;
}

.top-left {
  position: fixed;
  top: 10px;
  left: 10px;
}

.btn {
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="top-left">
  <a href="/" class="btn">← 戻る</a>
</div>

<h1>🛡️ 家電ディフェンス</h1>

<canvas id="game" width="400" height="400"></canvas>

<p>
HP: <span id="hp">5</span> |
スコア: <span id="score">0</span>
</p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let enemies = [];
let score = 0;
let hp = 5;

function spawnEnemy() {
  enemies.push({
    x: Math.random() * 360,
    y: 0
  });
}

function draw() {
  ctx.clearRect(0,0,400,400);

  ctx.fillStyle = "cyan";
  ctx.fillRect(170,360,60,20);

  enemies.forEach(e=>{
    ctx.fillStyle="red";
    ctx.fillRect(e.x,e.y,20,20);
  });
}

function update() {
  for(let i=enemies.length-1;i>=0;i--){
    enemies[i].y+=2;

    if(enemies[i].y>360){
      enemies.splice(i,1);
      hp--;
      document.getElementById("hp").innerText=hp;
    }
  }

  if(hp<=0){
    alert("ゲームオーバー");
    location.reload();
  }
}

canvas.addEventListener("click",e=>{
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;

  for(let i=enemies.length-1;i>=0;i--){
    let en=enemies[i];
    if(x>en.x&&x<en.x+20&&y>en.y&&y<en.y+20){
      enemies.splice(i,1);
      score++;
      document.getElementById("score").innerText=score;
    }
  }
});

setInterval(spawnEnemy,1000);

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
